<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive Terminal</title>

<style>
body{
    background:#000;
    color:#00ff00;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#terminal{
    width:700px;
    border:2px solid #00ff00;
    padding:30px;
    box-shadow:0 0 20px #00ff00;
}

pre{
    white-space:pre-wrap;
    font-size:20px;
}

input{
    width:100%;
    margin-top:20px;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px;
    font-size:20px;
}
</style>

</head>

<body>

<div id="terminal">

<pre id="screen">ARCHIVE TERMINAL

ENTER ACCESS KEY:

></pre>

<input id="password" autocomplete="off">

</div>

<script>

const password = document.getElementById("password");

password.focus();

password.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        if(password.value.trim() === "7"){

            password.style.display = "none";

            typeLines();

        }else{

            password.value = "";

            document.getElementById("screen").textContent =
ARCHIVE TERMINAL

ACCESS DENIED

ENTER ACCESS KEY:

>;

        }

    }

});

const lines = [

"ARCHIVE TERMINAL",

"",

"ACCESS GRANTED",

"",

"Loading Navigation Archive...",

"",

"Searching...",

"",

"Coordinates Recovered:",

"",

37°14'41.7"N 122°08'42.2"W,

"",

"> █"

];

function typeLines(){

    let screen = document.getElementById("screen");

    screen.textContent = "";

    let i = 0;

    function next(){

        if(i >= lines.length){

            return;

        }

        screen.textContent += lines[i] + "\n";

        i++;

        setTimeout(next,500);

    }

    next();

}

</script>

</body>
</html>
