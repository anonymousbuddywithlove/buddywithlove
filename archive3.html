<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive Terminal</title>

<style>

body{
    background:#000;
    color:#00ff00;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#terminal{
    width:700px;
    border:2px solid #00ff00;
    padding:30px;
    box-shadow:0 0 20px #00ff00;
}

pre{
    white-space:pre-wrap;
    font-size:18px;
}

input{
    width:100%;
    background:#000;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px;
    font-size:18px;
    margin-top:20px;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="terminal">

<pre id="screen">ARCHIVE TERMINAL

ENTER ACCESS KEY:

</pre>

<input id="password" autocomplete="off">

</div>

<script>

const input=document.getElementById("password");

input.focus();

input.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        unlock();

    }

});

function unlock(){

    if(input.value.trim()!=="7"){

        document.getElementById("screen").textContent=
`ARCHIVE TERMINAL

ACCESS DENIED

ENTER ACCESS KEY:

> `;

        input.value="";
        return;

    }

    input.style.display="none";

    boot();

}

function boot(){

const screen=document.getElementById("screen");

const lines = [

"ARCHIVE TERMINAL",
"",
"ACCESS GRANTED",
"",
"Loading Navigation Archive...",
"",
"Searching...",
"",
"Coordinates Recovered:",
"",
'37°14'41.7"N 122°08'42.2"W.',
"",
"> █"

];

screen.textContent="";

let i=0;

function nextLine(){

    if(i>=lines.length){

        return;

    }

    screen.textContent+=lines[i]+"\n";

    i++;

    setTimeout(nextLine,450);

}

nextLine();

}

</script>

</body>
</html>
