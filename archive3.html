<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive 3</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal">

<pre id="boot">
ARCHIVE TERMINAL

ENTER ACCESS KEY:
</pre>

<input id="password" type="text" autocomplete="off">

<button onclick="checkPassword()">UNLOCK</button>

<p id="output"></p>

</div>

<script>

function checkPassword(){

    let answer=document.getElementById("password").value.trim();

    if(answer==="7"){

        document.querySelector("button").style.display="none";
        document.getElementById("password").style.display="none";

        document.getElementById("boot").textContent=

`ARCHIVE TERMINAL

ACCESS GRANTED

Loading Navigation Archive...

Searching...

Coordinates Recovered:

37°14'41.7"N 122°08'42.2"W

> █`;

    }

    else{

        document.getElementById("output").textContent="ACCESS DENIED";

    }

}

</script>

</body>
</html>
