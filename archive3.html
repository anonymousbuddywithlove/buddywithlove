<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archive Terminal</title>

<style>

body{
    background:black;
    color:#00ff00;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

#terminal{
    width:700px;
    border:2px solid #00ff00;
    padding:30px;
    box-shadow:0 0 20px #00ff00;
}

pre{
    white-space:pre-wrap;
    font-size:20px;
}

input{
    width:100%;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px;
    font-size:20px;
    margin-top:20px;
}

button{
    margin-top:15px;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#003300;
}

</style>

</head>

<body>

<div id="terminal">

<pre id="screen">ARCHIVE TERMINAL

ENTER ACCESS KEY:

></pre>

<input id="password" type="text">

<button onclick="unlock()">UNLOCK</button>

</div>

<script>

function unlock(){

    var password = document.getElementById("password").value;
    var screen = document.getElementById("screen");

    if(password === "7"){

        document.getElementById("password").style.display = "none";
        document.querySelector("button").style.display = "none";

        screen.textContent =

ARCHIVE TERMINAL

ACCESS GRANTED

Loading Navigation Archive...

Searching...

Coordinates Recovered:

37°14'41.7"N 122°08'42.2"W

> █;

    }

    else{

        screen.textContent =

ARCHIVE TERMINAL

ACCESS DENIED

ENTER ACCESS KEY:

>;

        document.getElementById("password").value = "";

    }

}

</script>

</body>
</html>
