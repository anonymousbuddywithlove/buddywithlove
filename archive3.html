<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal">

<pre id="terminalText"></pre>

<input
    id="nextInput"
    type="text"
    autocomplete="off"
    style="display:none;"
>

<p id="output"></p>

</div>

<script>

const lines = [

"ACCESS GRANTED",
"",
"Loading Archive...",
"",
"Decrypting...",
"",
"████████████████████",
"",
"Recovered Fragment:",
"",
"37°14'41.7"N 122°08'42.2"W.",
"",
"Recovered Fragment:",
"",
"GOOD LUCK",
""
];

let current = 0;

function typeNext(){

    if(current >= lines.length){

    document.getElementById("terminalText").textContent += "> ";

    const cursor = document.createElement("span");
    cursor.textContent = "█";

    document.getElementById("terminalText").appendChild(cursor);

    setInterval(function(){

        cursor.style.visibility =
            cursor.style.visibility === "hidden"
            ? "visible"
            : "hidden";

    },500);

    return;

}

    document.getElementById("terminalText").textContent += lines[current] + "\n";

    current++;

    setTimeout(typeNext,500);

}

typeNext();

</script>

</body>
</html>
