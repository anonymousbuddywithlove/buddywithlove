<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive 3</title>

<style>

body{
    background:#000;
    color:#00ff00;
    font-family:Courier New, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.terminal{
    width:700px;
    border:2px solid #00ff00;
    padding:30px;
    box-shadow:0 0 20px #00ff00;
}

pre{
    white-space:pre-wrap;
    font-size:20px;
}

input{
    width:100%;
    margin-top:20px;
    background:#000;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px;
    font-size:20px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    background:#000;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#003300;
}

</style>
</head>

<body>

<div class="terminal">

<pre id="screen">ARCHIVE TERMINAL

ENTER ACCESS KEY:

></pre>

<input id="password" type="text">

<button onclick="unlock()">UNLOCK</button>

<p id="message"></p>

</div>

<script>

function unlock(){

    var password = document.getElementById("password").value.trim();

    if(password !== "7"){

        document.getElementById("message").textContent="ACCESS DENIED";
        return;

    }

    document.getElementById("password").style.display="none";
    document.querySelector("button").style.display="none";
    document.getElementById("message").textContent="";

    var screen=document.getElementById("screen");

    screen.textContent=
`ARCHIVE TERMINAL

ACCESS GRANTED

Loading Navigation Archive...

Searching...

Coordinates Recovered:

37°14'41.7"N 122°08'42.2"W

> █`;

}

</script>

</body>
</html>
